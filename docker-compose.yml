services:
  web:
    build: .
    container_name: video-web
    environment:
      - FLASK_ENV=production
      # 필요 시 여러분 앱용 환경변수 추가
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5510/sys_ok"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: video-nginx
    ports:
      - "5510:5510"          # 호스트 8080 → Nginx 80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/app/static:ro   # 선택(정적 폴더가 있을 때)
    depends_on:
      - web
    restart: unless-stopped
